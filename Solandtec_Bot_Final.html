<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Solandtec Bot — Inventario</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F0F4F8;display:flex;align-items:center;justify-content:center;min-height:100vh}
#app{display:flex;flex-direction:column;height:680px;width:100%;max-width:500px;border:1px solid #CBD5E0;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 4px 24px rgba(0,0,0,0.1)}
#hdr{background:#1F4E79;padding:13px 15px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{width:36px;height:36px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;color:#1F4E79;flex-shrink:0}
.hinfo h2{color:#fff;font-size:15px;font-weight:600}
.hinfo p{color:#9FC5E8;font-size:11px}
.hdot{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:#9FC5E8}
.dot{width:8px;height:8px;border-radius:50%;background:#57BB8A}
.dot.red{background:#E24B4A}
.cfg-toggle{padding:4px 9px;background:transparent;color:#9FC5E8;border:1px solid #9FC5E8;border-radius:6px;font-size:10px;cursor:pointer;margin-left:8px}
#cfg-panel{background:#FFF8E1;border-bottom:1px solid #F0C040;padding:10px 14px;flex-shrink:0;font-size:12px}
#cfg-panel.hidden{display:none}
.cfg-row{display:flex;gap:6px;margin-top:5px;align-items:center}
.cfg-row label{color:#633806;font-size:11px;white-space:nowrap;min-width:95px}
.cfg-row input{flex:1;border:1px solid #F0C040;border-radius:6px;padding:5px 8px;font-size:11px;background:#fff;color:#333}
.cfg-btn{padding:5px 10px;background:#1F4E79;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer}
.cfg-ok{padding:5px 10px;background:#3B6D11;color:#fff;border:none;border-radius:6px;font-size:11px;cursor:pointer}
#msgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:10px;background:#F7FAFC}
.msg{display:flex;gap:7px;max-width:90%}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.av{width:28px;height:28px;border-radius:50%;background:#1F4E79;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0;font-weight:700}
.bubble{padding:9px 12px;border-radius:14px;font-size:12.5px;line-height:1.55;color:#222}
.msg.bot .bubble{background:#fff;border:1px solid #E2E8F0;border-bottom-left-radius:3px}
.msg.user .bubble{background:#1F4E79;color:#fff;border-bottom-right-radius:3px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.chip{padding:5px 11px;border:1px solid #CBD5E0;border-radius:999px;font-size:11.5px;cursor:pointer;background:#fff;color:#333;transition:background .12s}
.chip:hover{background:#EDF2F7}
.chip.bl{border-color:#1F4E79;color:#1F4E79}
.chip.rd{border-color:#A32D2D;color:#A32D2D}
.chip.gn{border-color:#3B6D11;color:#3B6D11}
.chip.am{border-color:#854F0B;color:#854F0B}
.pcard{background:#F7FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:8px 10px;font-size:11.5px;margin-bottom:5px}
.pname{font-weight:600;font-size:12.5px;color:#1A202C}
.pdet{color:#718096;margin-top:2px}
.badge{display:inline-block;padding:1px 7px;border-radius:999px;font-size:10px;font-weight:600;margin-left:5px}
.ok{background:#C6F6D5;color:#276749}.low{background:#FEEBC8;color:#744210}.out{background:#FED7D7;color:#822727}
.typing{display:flex;gap:4px;align-items:center;padding:2px 0}
.typing span{width:6px;height:6px;background:#A0AEC0;border-radius:50%;animation:bl 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bl{0%,80%,100%{opacity:.2}40%{opacity:1}}
.sform{background:#F7FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px}
.sform label{color:#718096;font-size:11px;display:block;margin-bottom:2px}
.sform input,.sform select{width:100%;border:1px solid #CBD5E0;border-radius:6px;padding:6px 8px;font-size:12px;font-family:Arial,sans-serif;background:#fff;color:#333}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cbtn{background:#A32D2D;color:#fff;border:none;border-radius:7px;padding:8px;font-size:12px;cursor:pointer;width:100%}
.cbtn:hover{background:#791F1F}
.xbtn{background:#fff;color:#718096;border:1px solid #CBD5E0;border-radius:7px;padding:8px;font-size:12px;cursor:pointer;width:100%;margin-top:3px}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.rtable{width:100%;border-collapse:collapse;font-size:11px;margin-top:5px}
.rtable th{text-align:left;color:#718096;font-weight:600;padding:3px 4px;border-bottom:1px solid #E2E8F0}
.rtable td{padding:3px 4px;color:#2D3748}
#footer{padding:10px;border-top:1px solid #E2E8F0;background:#fff;flex-shrink:0}
.irow{display:flex;gap:6px}
#txt{flex:1;border:1px solid #CBD5E0;border-radius:8px;padding:8px 11px;font-size:12.5px;font-family:Arial,sans-serif;color:#333;outline:none}
#txt:focus{border-color:#1F4E79}
#snd{padding:8px 14px;background:#1F4E79;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
#snd:hover{background:#2E75B6}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.sum-card{background:#F7FAFC;border:1px solid #E2E8F0;border-radius:8px;padding:8px;text-align:center}
.sum-lbl{font-size:10px;color:#718096}
.sum-val{font-size:16px;font-weight:700;color:#1A202C}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">SL</div>
    <div class="hinfo"><h2>Solandtec Bot</h2><p>Inventario en tiempo real · Google Sheets</p></div>
    <div class="hdot"><div class="dot red" id="connDot"></div><span id="connTxt">Sin conectar</span></div>
    <button class="cfg-toggle" onclick="toggleCfg()">&#9881; Config</button>
  </div>

  <div id="cfg-panel">
    <div style="font-size:12px;font-weight:600;color:#633806;margin-bottom:4px">&#128279; Conecta tu Google Sheet</div>
    <div class="cfg-row">
      <label>ID del Sheet</label>
      <input id="sheetId" placeholder="El ID largo de la URL de tu Google Sheet"/>
    </div>
    <div class="cfg-row">
      <label>URL del Script</label>
      <input id="scriptUrl" placeholder="URL de la implementación de Apps Script"/>
    </div>
    <div class="cfg-row" style="margin-top:8px;justify-content:flex-end">
      <button class="cfg-btn" onclick="testConnection()">Probar conexión</button>
      <button class="cfg-ok" onclick="saveConfig()" style="margin-left:6px">Guardar</button>
    </div>
    <div id="cfgStatus" style="font-size:11px;color:#633806;margin-top:5px"></div>
  </div>

  <div id="msgs"></div>

  <div id="footer">
    <div class="irow">
      <input id="txt" type="text" placeholder="Escribe un mensaje o usa los botones..."/>
      <button id="snd">Enviar</button>
    </div>
  </div>
</div>

<script>
const msgs=document.getElementById('msgs'),txt=document.getElementById('txt'),snd=document.getElementById('snd');
let config={sheetId:"1H-P7C5Dzsg9BbkukrdrpNvL7iBCh9sQ8Q8j8V9diTsg",scriptUrl:"https://script.google.com/macros/s/AKfycbx1aSQ_da7t02Gj45zuAAuWS36CZhngU6XA41bzP4gT2rHRsCmQ4ORZeGWiuh1lEE8A/exec"};
let inv={solandtec:[],solar:[]};
let selSrc='solandtec',sales=[];

function toggleCfg(){document.getElementById('cfg-panel').classList.toggle('hidden')}

function saveConfig(){
  config.sheetId=document.getElementById('sheetId').value.trim();
  config.scriptUrl=document.getElementById('scriptUrl').value.trim();
  document.getElementById('cfgStatus').textContent=config.scriptUrl?'Guardado. Prueba la conexión.':'Completa la URL del script.';
}

async function testConnection(){
  const surl=document.getElementById('scriptUrl').value.trim();
  if(!surl){document.getElementById('cfgStatus').textContent='Ingresa la URL del script.';return;}
  document.getElementById('cfgStatus').textContent='Conectando...';
  try{
    const res=await fetch(surl+'?action=getAll');
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    inv.solandtec=data.solandtec||[];
    inv.solar=data.solar||[];
    config.scriptUrl=surl;
    config.sheetId=document.getElementById('sheetId').value.trim();
    setConn(true);
    document.getElementById('cfgStatus').textContent=`Conectado. ${inv.solandtec.length+inv.solar.length} productos cargados.`;
    document.getElementById('cfg-panel').classList.add('hidden');
    botBubble(`&#10003; Conexión exitosa con Google Sheets.<br><b>${inv.solandtec.length}</b> productos en Solandtec · <b>${inv.solar.length}</b> en Solar.`);
    setTimeout(showMenu,400);
  }catch(e){document.getElementById('cfgStatus').textContent='Error: '+e.message;setConn(false);}
}

function setConn(ok){
  document.getElementById('connDot').className='dot'+(ok?'':' red');
  document.getElementById('connTxt').textContent=ok?'Conectado':'Sin conectar';
}

async function fetchAll(){
  if(!config.scriptUrl)return false;
  try{
    const res=await fetch(config.scriptUrl+'?action=getAll');
    const data=await res.json();
    if(data.error)return false;
    inv.solandtec=data.solandtec||[];
    inv.solar=data.solar||[];
    setConn(true);return true;
  }catch{setConn(false);return false;}
}

function scrollBot(){msgs.scrollTop=msgs.scrollHeight}

function addUser(t){
  const d=document.createElement('div');d.className='msg user';
  d.innerHTML=`<div class="content"><div class="bubble">${t}</div></div>`;
  msgs.appendChild(d);scrollBot();
}

function botBubble(html){
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML=`<div class="av">SL</div><div class="content"><div class="bubble">${html}</div></div>`;
  msgs.appendChild(d);scrollBot();return d;
}

function botChips(html,chips){
  const d=document.createElement('div');d.className='msg bot';
  const ch=chips.map(c=>`<span class="chip ${c.cls||''}" data-v="${c.v}">${c.l}</span>`).join('');
  d.innerHTML=`<div class="av">SL</div><div class="content">${html?`<div class="bubble">${html}</div>`:''}<div class="chips">${ch}</div></div>`;
  msgs.appendChild(d);
  d.querySelectorAll('.chip').forEach(x=>x.addEventListener('click',()=>handle(x.dataset.v)));
  scrollBot();
}

function typing(cb,ms=700){
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML=`<div class="av">SL</div><div class="content"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(d);scrollBot();
  setTimeout(()=>{d.remove();cb();scrollBot();},ms);
}

function badge(q){
  if(q<=0)return`<span class="badge out">Agotado</span>`;
  if(q<=3)return`<span class="badge low">Stock bajo</span>`;
  return`<span class="badge ok">Disponible</span>`;
}

function fmtQ(n){return'Q'+Number(n).toLocaleString('es-GT',{minimumFractionDigits:2,maximumFractionDigits:2});}

function showMenu(){
  botChips('¿En qué te puedo ayudar?',[
    {l:'&#128269; Consultar disponibilidad',v:'consultar',cls:'bl'},
    {l:'&#128230; Registrar venta',v:'venta',cls:'rd'},
    {l:'&#128994; Agregar stock de oficina',v:'stock_of',cls:'gn'},
    {l:'&#128203; Historial de sesión',v:'historial'},
    {l:'&#128202; Resumen general',v:'resumen',cls:'am'},
  ]);
}

function showInv(src){
  selSrc=src;
  const items=inv[src];
  if(!items||!items.length){botBubble('No hay productos o falta conexión.');botChips('',[{l:'↩ Menú',v:'menu'}]);return;}
  const lbl=src==='solandtec'?'Solandtec':'Solar';
  let html=`<b>Inventario ${lbl}</b> — ${items.length} productos<br><br>`;
  items.forEach(it=>{
    html+=`<div class="pcard"><div class="pname">${it.producto}${badge(it.cantidad)}</div>
      <div class="pdet">${it.marca} · ${it.modelo}</div>
      <div class="pdet" style="margin-top:3px">Serie: <b>${it.serie}</b> &nbsp;|&nbsp; Disponible: <b>${it.cantidad}</b> &nbsp;|&nbsp; Precio: <b>${fmtQ(it.precio)}</b></div></div>`;
  });
  botBubble(html);
  botChips('',[{l:'Registrar venta aquí',v:'venta_src',cls:'rd'},{l:'↩ Menú',v:'menu'}]);
}

function pickSale(src){
  selSrc=src||selSrc;
  const items=(inv[selSrc]||[]).filter(i=>i.cantidad>0);
  if(!items.length){botBubble('No hay productos disponibles.');botChips('',[{l:'↩ Menú',v:'menu'}]);return;}
  const chips=items.map(i=>({l:`${i.producto} (${i.cantidad} disp.)`,v:'sp_'+i.fila+'_'+selSrc}));
  chips.push({l:'↩ Cancelar',v:'menu'});
  botChips('Selecciona el <b>producto a vender</b>:',chips);
}

function pickStock(src){
  selSrc=src||selSrc;
  const items=inv[selSrc]||[];
  if(!items.length){botBubble('No hay productos.');botChips('',[{l:'↩ Menú',v:'menu'}]);return;}
  const chips=items.map(i=>({l:i.producto,v:'stk_'+i.fila+'_'+selSrc,cls:'gn'}));
  chips.push({l:'↩ Cancelar',v:'menu'});
  botChips('Selecciona el producto al que agregarás <b>stock de oficina</b>:',chips);
}

function showSaleForm(fila,src){
  const items=inv[src]||[];
  const prod=items.find(i=>i.fila===parseInt(fila));
  if(!prod){showMenu();return;}
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML=`<div class="av">SL</div><div class="content"><div class="bubble">Completa los datos:<br><br>
    <div class="sform">
      <div><div style="font-weight:600;font-size:12.5px">${prod.producto}</div>
        <div style="font-size:11px;color:#718096">${prod.marca} · ${prod.modelo} · Disponible: <b>${prod.cantidad}</b></div></div>
      <div class="g2">
        <div><label>Cantidad</label><input type="number" id="sq" min="1" max="${prod.cantidad}" value="1"/></div>
        <div><label>Precio (Q)</label><input type="number" id="sp" value="${prod.precio}" min="0"/></div>
      </div>
      <div><label>Cliente *</label><input type="text" id="sc" placeholder="Nombre del cliente"/></div>
      <div class="g2">
        <div><label>Fecha</label><input type="text" id="sf" placeholder="DD/MM/AAAA"/></div>
        <div><label>Observaciones</label><input type="text" id="so" placeholder="Opcional"/></div>
      </div>
      <button class="cbtn" id="doSale">&#10003; Confirmar venta en Google Sheets</button>
      <button class="xbtn" id="canSale">Cancelar</button>
    </div>
  </div></div>`;
  msgs.appendChild(d);scrollBot();

  d.querySelector('#doSale').addEventListener('click',async()=>{
    const qty=parseInt(d.querySelector('#sq').value);
    const price=parseFloat(d.querySelector('#sp').value);
    const cliente=d.querySelector('#sc').value.trim();
    const fecha=d.querySelector('#sf').value.trim();
    const obs=d.querySelector('#so').value.trim();
    if(!qty||qty<1||qty>prod.cantidad){alert('Cantidad inválida. Disponible: '+prod.cantidad);return;}
    if(!cliente){alert('Ingresa el nombre del cliente.');return;}
    const btn=d.querySelector('#doSale');
    btn.innerHTML='<span class="spin"></span>Guardando en Sheets...';btn.disabled=true;
    try{
      const res=await fetch(config.scriptUrl,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'registerSale',source:src,fila,cantidad:qty,cliente,fecha,observaciones:obs,precio:price})});
      const data=await res.json();
      d.remove();
      if(data.ok){
        sales.push({prod:prod.producto,qty,precio:price,subtotal:qty*price,cliente,fecha:fecha||'Hoy',obs,source:src});
        await fetchAll();
        botBubble(`&#10003; <b>Venta registrada en Google Sheets</b><br><br><div class="pcard">
          <div class="pname">${prod.producto}</div>
          <div class="pdet">Cliente: <b>${cliente}</b> · Fecha: ${fecha||'Hoy'}</div>
          <div class="pdet">Vendido: <b>${qty} und.</b> · Subtotal: <b>${fmtQ(qty*price)}</b></div>
          <div class="pdet">Stock restante: <b>${data.nuevaDisponibilidad}</b>${badge(data.nuevaDisponibilidad)}</div>
        </div>`);
      }else{botBubble('Error: '+(data.error||'Desconocido'));}
    }catch(e){d.remove();botBubble('Error de conexión: '+e.message);}
    showMenu();
  });
  d.querySelector('#canSale').addEventListener('click',()=>{d.remove();showMenu();});
}

function showStockForm(fila,src){
  const items=inv[src]||[];
  const prod=items.find(i=>i.fila===parseInt(fila));
  if(!prod){showMenu();return;}
  const d=document.createElement('div');d.className='msg bot';
  d.innerHTML=`<div class="av">SL</div><div class="content"><div class="bubble">Agregar stock de oficina:<br><br>
    <div class="sform">
      <div><div style="font-weight:600;font-size:12.5px">${prod.producto}</div>
        <div style="font-size:11px;color:#718096">Stock de oficina actual: <b>${prod.stockOf}</b></div></div>
      <div><label>Cantidad a agregar</label><input type="number" id="stq" min="1" value="1"/></div>
      <button class="cbtn" id="doStk" style="background:#3B6D11">&#10003; Confirmar en Google Sheets</button>
      <button class="xbtn" id="canStk">Cancelar</button>
    </div>
  </div></div>`;
  msgs.appendChild(d);scrollBot();

  d.querySelector('#doStk').addEventListener('click',async()=>{
    const qty=parseInt(d.querySelector('#stq').value);
    if(!qty||qty<1){alert('Ingresa una cantidad válida.');return;}
    const btn=d.querySelector('#doStk');
    btn.innerHTML='<span class="spin"></span>Guardando...';btn.disabled=true;
    try{
      const res=await fetch(config.scriptUrl,{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({action:'addStockOficina',source:src,fila,cantidad:qty})});
      const data=await res.json();
      d.remove();
      if(data.ok){
        await fetchAll();
        botBubble(`&#10003; Stock actualizado en Google Sheets.<br><div class="pcard">
          <div class="pname">${prod.producto}</div>
          <div class="pdet">Nuevo stock de oficina: <b>${data.nuevoStock}</b></div>
        </div>`);
      }else{botBubble('Error: '+(data.error||'Desconocido'));}
    }catch(e){d.remove();botBubble('Error: '+e.message);}
    showMenu();
  });
  d.querySelector('#canStk').addEventListener('click',()=>{d.remove();showMenu();});
}

function showHistory(){
  if(!sales.length){botBubble('No hay ventas en esta sesión.');}
  else{
    let rows=sales.map(s=>`<tr><td>${s.prod}</td><td style="text-align:center">${s.qty}</td><td>${s.cliente}</td><td>${s.fecha}</td><td style="text-align:right">${fmtQ(s.subtotal)}</td></tr>`).join('');
    botBubble(`<b>Ventas de esta sesión</b> (${sales.length})<br><br><table class="rtable"><tr><th>Producto</th><th>Cant.</th><th>Cliente</th><th>Fecha</th><th style="text-align:right">Subtotal</th></tr>${rows}</table>`);
  }
  botChips('',[{l:'↩ Menú',v:'menu'}]);
}

function showResumen(){
  const all=[...inv.solandtec,...inv.solar];
  const vInv=all.reduce((s,i)=>s+(i.cantidad*i.precio),0);
  const vVend=all.reduce((s,i)=>s+(i.vendido*i.precio),0);
  const vStk=all.reduce((s,i)=>s+(i.stockOf*i.precio),0);
  const agot=all.filter(i=>i.cantidad<=0).length;
  const bajo=all.filter(i=>i.cantidad>0&&i.cantidad<=3).length;
  botBubble(`<b>Resumen general</b><br><br>
    <div class="sum-grid">
      <div class="sum-card"><div class="sum-lbl">Productos totales</div><div class="sum-val">${all.length}</div></div>
      <div class="sum-card"><div class="sum-lbl">Valor inventario</div><div class="sum-val" style="font-size:13px">${fmtQ(vInv)}</div></div>
      <div class="sum-card"><div class="sum-lbl">Valor vendido</div><div class="sum-val" style="font-size:13px;color:#A32D2D">${fmtQ(vVend)}</div></div>
      <div class="sum-card"><div class="sum-lbl">Valor stock oficina</div><div class="sum-val" style="font-size:13px;color:#3B6D11">${fmtQ(vStk)}</div></div>
    </div>
    <div style="font-size:11px;color:#718096">Agotados: <b style="color:#A32D2D">${agot}</b> &nbsp;|&nbsp; Stock bajo: <b style="color:#854F0B">${bajo}</b> &nbsp;|&nbsp; Ventas en sesión: <b>${sales.length}</b></div>`);
  botChips('',[{l:'↩ Menú',v:'menu'}]);
}

async function handle(val){
  if(val==='menu'){typing(showMenu);return;}
  if(val==='consultar'){
    addUser('Consultar disponibilidad');
    if(!config.scriptUrl){typing(()=>botBubble('Primero configura la conexión.'));return;}
    typing(async()=>{
      await fetchAll();
      botChips('¿Cuál inventario?',[
        {l:'Inventario Solandtec',v:'inv_sl',cls:'bl'},
        {l:'Inventario Solar',v:'inv_so',cls:'bl'},
        {l:'Ambos',v:'inv_all'},
      ]);
    },800);
setTimeout(function(){if(config.scriptUrl){fetchAll().then(function(ok){if(ok){setConn(true);}});}},1500);return;
  }
  if(val==='inv_sl'){addUser('Solandtec');typing(()=>showInv('solandtec'));return;}
  if(val==='inv_so'){addUser('Solar');typing(()=>showInv('solar'));return;}
  if(val==='inv_all'){addUser('Ambos');typing(()=>{showInv('solandtec');setTimeout(()=>showInv('solar'),300);},900);return;}
  if(val==='venta'||val==='venta_src'){
    addUser('Registrar venta');

    if(val==='venta_src'){typing(()=>pickSale(selSrc));return;}
    typing(()=>botChips('¿De cuál inventario?',[{l:'Solandtec',v:'vs_sl',cls:'rd'},{l:'Solar',v:'vs_so',cls:'rd'}]));return;
  }
  if(val==='vs_sl'){typing(async()=>{await fetchAll();pickSale('solandtec');});return;}
  if(val==='vs_so'){typing(async()=>{await fetchAll();pickSale('solar');});return;}
  if(val.startsWith('sp_')){const p=val.split('_');showSaleForm(p[1],p[2]);return;}
  if(val==='stock_of'){
    addUser('Stock de oficina');
    if(!config.scriptUrl){typing(()=>botBubble('Configura la conexión primero.'));return;}
    typing(()=>botChips('¿De cuál inventario?',[{l:'Solandtec',v:'sto_sl',cls:'gn'},{l:'Solar',v:'sto_so',cls:'gn'}]));return;
  }
  if(val==='sto_sl'){typing(async()=>{await fetchAll();pickStock('solandtec');});return;}
  if(val==='sto_so'){typing(async()=>{await fetchAll();pickStock('solar');});return;}
  if(val.startsWith('stk_')){const p=val.split('_');showStockForm(p[1],p[2]);return;}
  if(val==='historial'){addUser('Historial');typing(showHistory);return;}
  if(val==='resumen'){
    addUser('Resumen');
    if(!config.scriptUrl){typing(()=>botBubble('Configura la conexión primero.'));return;}
    typing(async()=>{await fetchAll();showResumen();});return;
  }
}

function handleText(v){
  addUser(v);const vl=v.toLowerCase();
  if(vl.includes('disponib')||vl.includes('consulta')||vl.includes('stock')){handle('consultar');return;}
  if(vl.includes('venta')||vl.includes('vender')){handle('venta');return;}
  if(vl.includes('historial')||vl.includes('registro')){handle('historial');return;}
  if(vl.includes('resumen')||vl.includes('total')){handle('resumen');return;}
  if(vl.includes('oficina')){handle('stock_of');return;}
  typing(showMenu);
}

snd.addEventListener('click',()=>{const v=txt.value.trim();if(v){handleText(v);txt.value='';}});
txt.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=txt.value.trim();if(v){handleText(v);txt.value='';}}} );
